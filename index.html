<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta name="theme-color" content="#F5F3EF">
  
  <title>Site</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* PALETA SARTORIAL CANVAS */
    :root {
      --bg: #F5F3EF;               
      --text: #000000;             
      --text-muted: #0A0A0A;       
      --text-light: #4A453E;       
      --accent: #736351;           
      --line: rgba(0, 0, 0, 0.15); 
      
      --font-serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    * { 
      box-sizing: border-box; 
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-muted);   
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 24px;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 300;
      color: var(--text);
      letter-spacing: -0.5px;
      margin: 0;
      line-height: 1.1;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>HELLO BRAZIL.</h1>
  </div>

</body>
</html>
